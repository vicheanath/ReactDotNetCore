name: Publish

# Publishes both packages when a vX.Y.Z tag is pushed (or via manual dispatch). Both use Trusted
# Publishing (OIDC) — no long-lived tokens — with provenance/attestation. release.yml creates the
# GitHub Release from the same tag push.
# One-time prerequisites (already done for this repo):
# - npm: the package exists (bootstrapped once) and a Trusted Publisher is configured on npmjs.com
#   (org/user `vicheanath`, repo `ReactDotNetCore`, workflow `publish.yml`, environment `production`).
# - NuGet: a trusted publishing policy on nuget.org (same repo/workflow/environment); set NUGET_USER
#   (secret or variable) to your nuget.org username.
# NOTE: bump the package version before each release — npm/NuGet reject re-publishing an existing version.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  # Both packages are versioned in lockstep. Fail fast if the pushed tag (vX.Y.Z) doesn't match the
  # version in the repo, so we never publish a mismatched/duplicate version.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Versions match the tag
        run: |
          if [ "$GITHUB_REF_TYPE" != "tag" ]; then
            echo "Manual dispatch (not a tag) — publishing the versions in the repo as-is."
            exit 0
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          NPM=$(node -p "require('./packages/react-dotnetcore-runtime/package.json').version")
          NUGET=$(grep -oP '(?<=<Version>)[^<]+' Directory.Build.props | head -1)
          echo "tag=$VERSION  npm=$NPM  nuget=$NUGET"
          [ "$VERSION" = "$NPM" ] || { echo "::error::npm version $NPM != tag $VERSION"; exit 1; }
          [ "$VERSION" = "$NUGET" ] || { echo "::error::NuGet version $NUGET != tag $VERSION"; exit 1; }
          echo "✓ versions match the tag"

  npm:
    needs: verify
    runs-on: ubuntu-latest
    environment: production   # match the environment on the npm Trusted Publisher policy
    permissions:
      id-token: write   # required for npm Trusted Publishing (OIDC) + provenance
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Upgrade npm (trusted publishing needs >= 11.5.1)
        run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build:runtime
      - name: Publish @react-dotnetcore/runtime (OIDC trusted publishing)
        # No token — npm performs the OIDC exchange automatically. --provenance attaches a signed
        # build attestation (needs id-token: write + matching repository.url in package.json).
        run: npm publish -w @react-dotnetcore/runtime --access public --provenance

  nuget:
    needs: verify
    runs-on: ubuntu-latest
    # Must match the Environment configured on the nuget.org trusted publishing policy, so the
    # OIDC token carries the expected `environment` claim. Remove if your policy has no environment.
    environment: production
    permissions:
      id-token: write   # required for NuGet Trusted Publishing (OIDC)
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x   # latest SDK builds all multi-target frameworks (net6 → net10)
      - name: Pack
        run: dotnet pack packages/react-dotnetcore-aspnetcore/ReactDotNetCore.AspNetCore.csproj -c Release -o artifacts
      - name: NuGet login (OIDC -> short-lived API key)
        uses: NuGet/login@v1
        id: login
        with:
          # Your nuget.org username (profile name, NOT your email). Set NUGET_USER as either a
          # Secret or a Variable in the `production` environment — or hardcode the username here.
          user: ${{ secrets.NUGET_USER || vars.NUGET_USER }}
      - name: Push to NuGet.org
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
