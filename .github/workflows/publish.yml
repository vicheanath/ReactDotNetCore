name: Publish

# Publishes both packages on a GitHub Release (or manual dispatch). Both use Trusted Publishing
# (OIDC) — no long-lived tokens.
# - npm: configure a Trusted Publisher on npmjs.com for this package (repo + workflow file +
#   environment). NOTE: the package must already exist, so the FIRST publish must be done with a
#   token or locally (`npm publish`); after that, OIDC works.
# - NuGet: configure a trusted publishing policy on nuget.org (repo + workflow file + environment),
#   and set the NUGET_USER secret to your nuget.org username.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  npm:
    runs-on: ubuntu-latest
    environment: production   # match the environment on the npm Trusted Publisher policy
    permissions:
      id-token: write   # required for npm Trusted Publishing (OIDC) + provenance
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Upgrade npm (trusted publishing needs >= 11.5.1)
        run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build:runtime
      - name: Publish @react-dotnetcore/runtime (OIDC trusted publishing)
        run: npm publish -w @react-dotnetcore/runtime --access public
        # No NODE_AUTH_TOKEN — npm performs the OIDC exchange automatically and adds provenance.

  nuget:
    runs-on: ubuntu-latest
    # Must match the Environment configured on the nuget.org trusted publishing policy, so the
    # OIDC token carries the expected `environment` claim. Remove if your policy has no environment.
    environment: production
    permissions:
      id-token: write   # required for NuGet Trusted Publishing (OIDC)
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
      - name: Pack
        run: dotnet pack packages/react-dotnetcore-aspnetcore/ReactDotNetCore.AspNetCore.csproj -c Release -o artifacts
      - name: NuGet login (OIDC -> short-lived API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}   # your nuget.org username (profile name), not your email
      - name: Push to NuGet.org
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
